<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Copad — collaborative writing</title>
    <meta
      name="description"
      content="Copad is a real-time collaborative writing tool. Write together peer-to-peer, no server required, and save to your own cloud storage."
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="theme-color" content="#f6f6f4" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#16161a" media="(prefers-color-scheme: dark)" />
    <meta name="color-scheme" content="light dark" />
    <!-- Resolve the theme before first paint to avoid a flash of the wrong theme. -->
    <script>
      (function () {
        try {
          var choice = localStorage.getItem('__APP_NAMESPACE__:theme') || 'system';
          var dark =
            choice === 'dark' ||
            (choice === 'system' &&
              window.matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.dataset.theme = dark ? 'dark' : 'light';
        } catch (e) {
          document.documentElement.dataset.theme = 'light';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
