name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Type-check .ts files
      - run: npx tsc --noEmit

      # Type-check .svelte files
      - run: npm run check

      # Unit tests (schema + storage adapters)
      - run: npm test

      # Build without secrets — WebDAV adapter is always available
      - run: npm run build
