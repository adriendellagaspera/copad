name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Type-check .ts files
      - run: npx tsc --noEmit

      # Type-check .svelte files
      - run: npm run check

      # Unit tests (schema + storage adapters)
      - run: npm test

      # Build without secrets — WebDAV adapter is always available
      - run: npm run build

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Install Playwright's Chromium browser and its system dependencies
      - run: npx playwright install --with-deps chromium

      # Build the app so `npm run preview` can serve it
      - run: npm run build

      # Run e2e tests (playwright.config.ts starts the preview + signaling servers)
      - run: npx playwright test
        env:
          CI: true

  # Validate the self-hosted TURN relay (turn/). Infra, not app code, so these
  # are structural guards, not a live relay test — see turn/TESTING.md for the
  # manual tiers that exercise NAT traversal and TLS on a real VPS.
  turn:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Compose is valid and the coturn image is pinned (never :latest).
      - name: Validate compose file and image pin
        run: |
          rendered=$(docker compose -f turn/docker-compose.yml config)
          echo "$rendered" | grep -qE 'image: coturn/coturn:[0-9]' \
            || { echo "::error file=turn/docker-compose.yml::coturn image must be pinned to a version, not :latest"; exit 1; }

      # The live config (with real secrets) must be git-ignored so an operator's
      # edited copy can't be committed.
      - name: Assert turnserver.conf is git-ignored
        run: |
          cp turn/turnserver.conf.example turn/turnserver.conf
          git check-ignore -q turn/turnserver.conf \
            || { echo "::error file=turn/.gitignore::turn/turnserver.conf is not git-ignored — real secrets could be committed"; exit 1; }
          rm -f turn/turnserver.conf

      # The security-critical directives must stay in the template (guards against
      # an accidental deletion silently weakening the relay).
      - name: Assert hardening directives are present
        run: |
          conf=turn/turnserver.conf.example
          req=(
            'denied-peer-ip=127.0.0.0-127.255.255.255'
            'denied-peer-ip=169.254.0.0-169.254.255.255'
            'denied-peer-ip=100.64.0.0-100.127.255.255'
            'denied-peer-ip=::1'
            'total-quota='
            'max-bps='
            'min-port=49152'
            'max-port=65535'
            'fingerprint'
            'no-cli'
          )
          status=0
          for line in "${req[@]}"; do
            grep -qF "$line" "$conf" || { echo "::error file=$conf::missing hardening directive: $line"; status=1; }
          done
          exit $status

      # Run the real coturn binary against the (placeholder-substituted) config:
      # it should start and stay up. A fast non-124 exit means coturn rejected it.
      # Non-gating (continue-on-error): this exercises a pulled image + host
      # networking on the runner, which the deterministic checks above don't need —
      # it surfaces coturn's log for inspection without blocking the PR on the
      # runtime environment. Flip to gating once it's observed green in CI.
      - name: Smoke-test that coturn accepts the config
        continue-on-error: true
        run: |
          sed -e 's/YOUR_PUBLIC_IP/127.0.0.1/' \
              -e 's/YOUR_DOMAIN/test.local/' \
              -e 's/CHANGE_ME_STRONG_SECRET/ci-test-secret/' \
              turn/turnserver.conf.example > /tmp/turnserver.conf
          set +e
          timeout 6 docker run --rm --network host \
            -v /tmp/turnserver.conf:/etc/coturn/turnserver.conf:ro \
            coturn/coturn:4.6.2 -c /etc/coturn/turnserver.conf >/tmp/coturn.log 2>&1
          code=$?
          set -e
          echo "----- coturn log -----"; cat /tmp/coturn.log; echo "----------------------"
          if [ "$code" != "124" ]; then
            echo "::error::coturn exited early (code $code) — it likely rejected the config"; exit 1
          fi
          if grep -iq 'cannot parse' /tmp/coturn.log; then
            echo "::error::coturn reported a config parse error"; exit 1
          fi
          echo "coturn started and stayed up — config accepted"
