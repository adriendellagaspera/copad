name: Deploy

on:
  push:
    branches: [main]

# Push to the gh-pages branch (branch-based Pages source, not the artifact API).
# This lets PR previews coexist as pr-<N>/ subdirectories on the same branch.
# Pages source (Settings → Pages → Source = "Deploy from a branch", gh-pages / root)
# is enforced automatically by the "Ensure Pages serves the gh-pages branch" step
# below — no manual toggle required. pages: write lets that step configure Pages.
permissions:
  contents: write
  pages: write

concurrency:
  group: gh-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: https://adriendellagaspera.github.io/copad/

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build -- --base=/copad/
        # NOTE: every VITE_* var is inlined into the public client bundle at build
        # time, so none of these is actually secret. They all live as repo *Variables*
        # (Settings → Secrets and variables → Variables).
        env:
          VITE_DROPBOX_APP_KEY:   ${{ vars.VITE_DROPBOX_APP_KEY }}
          VITE_PCLOUD_CLIENT_ID:  ${{ vars.VITE_PCLOUD_CLIENT_ID }}
          VITE_PROXY_URL:         ${{ vars.VITE_PROXY_URL }}
          VITE_WEBDAV_URL:        ${{ vars.VITE_WEBDAV_URL }}
          VITE_STORAGE_BACKEND:   ${{ vars.VITE_STORAGE_BACKEND }}
          VITE_REDIRECT_URI:      https://adriendellagaspera.github.io/copad/redirect.html
          # Transport: 'webrtc' (default) or 'websocket'. Chosen explicitly.
          VITE_COLLAB_TRANSPORT:  ${{ vars.VITE_COLLAB_TRANSPORT }}
          # wss:// URL of a y-webrtc signaling server (used when transport=webrtc).
          # If unset on a deployed origin, real-time collab is disabled (warning shown).
          VITE_SIGNALING_URL:     ${{ vars.VITE_SIGNALING_URL }}
          # wss:// URL of a y-websocket hub (used when transport=websocket) —
          # a central relay, no STUN/TURN, works on mobile / restrictive NATs. See README.
          VITE_WEBSOCKET_URL:     ${{ vars.VITE_WEBSOCKET_URL }}
          VITE_DEFAULT_ROOM:      ${{ vars.VITE_DEFAULT_ROOM }}
          # Deployment-wide fallback room key (per-room secure links/passwords take
          # precedence). Public in the bundle like the rest — a Variable, not a Secret.
          VITE_ROOM_PASSWORD:     ${{ vars.VITE_ROOM_PASSWORD }}
          # WebRTC NAT traversal — STUN falls back to public Google default.
          # TURN is needed for restrictive networks (mobile carriers / symmetric NAT).
          VITE_STUN_URL:          ${{ vars.VITE_STUN_URL }}
          VITE_TURN_URL:          ${{ vars.VITE_TURN_URL }}
          VITE_TURN_USERNAME:     ${{ vars.VITE_TURN_USERNAME }}
          VITE_TURN_PASSWORD:     ${{ vars.VITE_TURN_PASSWORD }}
          # HTTP(S) endpoint returning { iceServers: [...] } (e.g. the Cloudflare
          # TURN Worker in deploy/ice-worker/) — mints short-lived TURN creds
          # server-side. Takes precedence over the static VITE_TURN_* above.
          VITE_ICE_SERVERS_URL:   ${{ vars.VITE_ICE_SERVERS_URL }}
          VITE_ICE_FETCH_TIMEOUT_MS: ${{ vars.VITE_ICE_FETCH_TIMEOUT_MS }}

      # keep_files: true preserves pr-<N>/ preview directories from other workflow runs.
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          keep_files: true

      # Self-heal the one setting the whole branch-based scheme depends on: make
      # GitHub Pages serve the gh-pages branch at / (root). Without it, every
      # branch push — production AND pr-<N>/ previews — is silently ignored and
      # the live site 404s. Best-effort; never fails the build. See the script.
      - name: Ensure Pages serves the gh-pages branch
        uses: actions/github-script@v7
        with:
          script: |
            const ensurePagesSource = require('./.github/scripts/ensure-pages-source.cjs')
            await ensurePagesSource({ github, context, core })
