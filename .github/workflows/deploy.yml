name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build -- --base=/copad/
        env:
          VITE_DROPBOX_APP_KEY:   ${{ secrets.VITE_DROPBOX_APP_KEY }}
          VITE_PCLOUD_CLIENT_ID:  ${{ secrets.VITE_PCLOUD_CLIENT_ID }}
          VITE_PROXY_URL:         ${{ secrets.VITE_PROXY_URL }}
          VITE_REDIRECT_URI:      https://adriendellagaspera.github.io/copad/redirect.html
          # wss:// URL of the signaling server (deploy signaling/ to Render/Fly.io).
          # If unset, real-time collab is disabled and a warning banner is shown.
          VITE_SIGNALING_URL:     ${{ secrets.VITE_SIGNALING_URL }}
          VITE_ROOM:              copad-demo
          # WebRTC NAT traversal — STUN falls back to public Google default.
          # TURN is needed for restrictive networks (mobile carriers / symmetric NAT).
          VITE_STUN_URL:          ${{ secrets.VITE_STUN_URL }}
          VITE_TURN_URL:          ${{ secrets.VITE_TURN_URL }}
          VITE_TURN_USERNAME:     ${{ secrets.VITE_TURN_USERNAME }}
          VITE_TURN_CREDENTIAL:   ${{ secrets.VITE_TURN_CREDENTIAL }}

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - uses: actions/deploy-pages@v4
        id: deployment
