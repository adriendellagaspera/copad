# fly.toml — deploy with: fly launch (first time) or fly deploy (updates)
# from the signaling/ directory.

app = "copad-signaling"   # change to your chosen app name
primary_region = "cdg"    # Paris; change to your nearest region

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
